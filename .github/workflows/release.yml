name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub Release and publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"

          if [ "$PACKAGE_VERSION" != "$TAG_NAME" ]; then
            echo "Tag $TAG_NAME does not match package.json version $PACKAGE_VERSION."
            exit 1
          fi

      - name: Run tests and package check
        run: npm run check

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

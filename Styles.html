<style>
    :root {
        --c-primary: #6b0f0a;
        --c-primary-hover: #8e1d15;
        --c-primary-light: #b53326;
        --c-cream: #f7eedc;
        --c-sky: #6bc6ee;
        --c-gold: #f7c442;
        --c-bg: #faf8f5;
        --c-card: #fff;
        --c-text: #2d2d2d;
        --c-text-secondary: #666;
        --c-text-muted: #999;
        --c-border: #e8e4dd;
        --shadow: 0 4px 12px rgba(107, 15, 10, 0.1);
        --radius: 12px;
        --transition-speed: 0.3s;

        /* Legacy aliases kept for existing markup */
        --mw-primary: var(--c-primary);
        --mw-primary-dark: var(--c-primary-hover);
        --mw-accent: var(--c-gold);
        --mw-bg: var(--c-bg);
        --mw-card: var(--c-card);
        --mw-border: var(--c-border);
        --mw-text: var(--c-text);
        --mw-muted: var(--c-text-secondary);
        --mw-danger: #b42318;
        --mw-warning: #a15c07;
        --mw-success: #1f7a4d;
    }

    * {
        box-sizing: border-box;
    }
    body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--c-text);
        background: var(--c-bg);
        line-height: 1.5;
    }
    a {
        color: var(--c-primary);
    }

    /* Top bar */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 14px 24px;
        background: var(--c-card);
        border-bottom: 1px solid var(--c-border);
        position: sticky;
        top: 0;
        z-index: 2;
        box-shadow: var(--shadow);
    }
    .brand {
        display: flex;
        gap: 10px;
        align-items: baseline;
        flex-wrap: wrap;
    }
    .brand strong {
        color: var(--c-primary);
        font-size: 1.05rem;
    }
    .brand span {
        color: var(--c-text-muted);
        font-size: 13px;
    }
    nav {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }
    nav a {
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
        color: var(--c-primary);
        padding: 6px 10px;
        border-radius: 8px;
        transition:
            background var(--transition-speed) ease,
            color var(--transition-speed) ease;
    }
    nav a:hover {
        background: rgba(107, 15, 10, 0.08);
        color: var(--c-primary-hover);
    }

    .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 26px 16px 54px;
    }

    .card {
        background: var(--c-card);
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 22px;
        margin-bottom: 18px;
    }
    .hero {
        padding: 30px;
    }

    .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
        font-weight: 700;
        color: var(--c-primary);
        margin: 0 0 8px;
    }
    h1,
    h2,
    h3,
    h4 {
        margin-top: 0;
        color: var(--c-text);
        font-weight: 600;
    }
    h1 {
        color: var(--c-primary);
    }
    h2 {
        color: var(--c-primary);
    }
    h3 {
        color: var(--c-primary-hover);
    }
    h4 {
        color: var(--c-primary-light);
        font-size: 16px;
    }
    .lead {
        color: var(--c-text-secondary);
        font-size: 16px;
        max-width: 820px;
    }

    .grid {
        display: grid;
        gap: 18px;
    }
    .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
    }

    /* Buttons */
    .button,
    button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--c-border);
        border-radius: 20px;
        background: #fff;
        color: var(--c-primary);
        padding: 10px 18px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        min-height: 40px;
        transition: all var(--transition-speed) ease;
    }
    .button:hover,
    button:hover:not(:disabled) {
        background: rgba(107, 15, 10, 0.06);
        border-color: var(--c-primary);
        transform: translateY(-1px);
    }
    .button.primary,
    button.primary {
        background: var(--c-primary);
        color: #fff;
        border-color: var(--c-primary);
    }
    .button.primary:hover,
    button.primary:hover:not(:disabled) {
        background: var(--c-primary-hover);
        border-color: var(--c-primary-hover);
        color: #fff;
        box-shadow: 0 4px 12px rgba(107, 15, 10, 0.3);
    }
    button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
    }

    /* Forms */
    label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--c-text);
    }
    input,
    select,
    textarea {
        width: 100%;
        border: 2px solid var(--c-border);
        border-radius: var(--radius);
        padding: 10px 12px;
        font: inherit;
        background: var(--c-card);
        transition: all var(--transition-speed) ease;
    }
    input:focus,
    select:focus,
    textarea:focus {
        outline: none;
        border-color: var(--c-primary);
        box-shadow: 0 0 0 3px rgba(107, 15, 10, 0.1);
    }
    textarea {
        min-height: 74px;
        resize: vertical;
        line-height: 1.5;
    }

    .helper,
    .muted {
        color: var(--c-text-secondary);
        font-size: 13px;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 14px;
    }

    /* Indicator cards */
    .indicator {
        border: 1px solid var(--c-border);
        border-radius: 14px;
        padding: 16px;
        margin: 12px 0;
        background: #fbfaf7;
        transition:
            border-color var(--transition-speed) ease,
            box-shadow var(--transition-speed) ease;
    }
    .indicator:hover {
        border-color: var(--c-primary-light);
        box-shadow: var(--shadow);
    }
    .indicator header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
    }
    .indicator h3 {
        margin-bottom: 6px;
    }
    .weight {
        color: var(--c-primary);
        background: rgba(107, 15, 10, 0.08);
        padding: 4px 10px;
        border-radius: 999px;
        font-weight: 700;
        white-space: nowrap;
        font-size: 13px;
    }
    .score-help {
        margin: 8px 0;
        padding-left: 18px;
        color: var(--c-text-secondary);
        font-size: 13px;
    }
    .evidence-warning {
        color: #a15c07;
        font-size: 13px;
        display: none;
        margin-top: 6px;
    }
    .water-disabled {
        opacity: 0.5;
        display: none;
    }

    /* Preview footer */
    .preview {
        position: sticky;
        bottom: 12px;
        z-index: 1;
        border: 1px solid var(--c-border);
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(8px);
        border-radius: 14px;
        padding: 14px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        box-shadow: 0 8px 20px rgba(107, 15, 10, 0.12);
    }

    /* Chips */
    .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 800;
        border: 1px solid transparent;
        letter-spacing: 0.3px;
    }
    .rating-s {
        background: #e9f7ef;
        color: #096b3a;
    }
    .rating-a {
        background: #edf7ff;
        color: #145a8a;
    }
    .rating-b {
        background: #fff8df;
        color: #805600;
    }
    .rating-c {
        background: #fff0df;
        color: #934b00;
    }
    .rating-d,
    .rating-revision {
        background: #fff0f0;
        color: var(--c-primary);
    }
    .status-ok {
        background: #e9f7ef;
        color: #1f7a4d;
    }
    .status-cap {
        background: #fff8df;
        color: #a15c07;
    }
    .status-error {
        background: #fff0f0;
        color: var(--c-primary);
    }

    /* Inserted rating display (web view, mirrors doc styling) */
    .inserted-rating {
        font-weight: 700;
    }
    .inserted-rating .rating-letter {
        font-weight: 800;
        letter-spacing: 0.5px;
    }
    .inserted-rating .rating-letter.r-s {
        color: #096b3a;
    }
    .inserted-rating .rating-letter.r-a {
        color: #145a8a;
    }
    .inserted-rating .rating-letter.r-b {
        color: #805600;
    }
    .inserted-rating .rating-letter.r-c {
        color: #934b00;
    }
    .inserted-rating .rating-letter.r-d {
        color: var(--c-primary);
    }
    .inserted-rating .rating-score {
        font-weight: 400;
        color: var(--c-text);
    }
    .inserted-rating .rating-link {
        font-weight: 400;
    }

    /* Tables */
    .table-wrap {
        overflow-x: auto;
        border-radius: var(--radius);
    }
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }
    th,
    td {
        border-bottom: 1px solid var(--c-border);
        padding: 10px 12px;
        text-align: left;
        vertical-align: top;
    }
    th {
        color: var(--c-text-secondary);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: var(--c-bg);
    }
    tbody tr:hover {
        background: rgba(107, 15, 10, 0.02);
    }

    /* Alerts */
    .alert {
        border-radius: var(--radius);
        padding: 12px 14px;
        margin: 12px 0;
        background: #fff8df;
        color: #a15c07;
        border: 1px solid #f2d37d;
    }
    .alert.error {
        background: #fff0f0;
        color: var(--c-primary);
        border-color: #fac5c0;
    }
    .alert.success {
        background: #e9f7ef;
        color: #1f7a4d;
        border-color: #b6e2c7;
    }
    .alert.info {
        background: rgba(107, 198, 238, 0.1);
        color: #14506a;
        border-color: rgba(107, 198, 238, 0.4);
        border-left: 4px solid var(--c-sky);
    }

    .loading {
        color: var(--c-text-muted);
    }

    /* Latest assessments list */
    .latest-list {
        display: grid;
        gap: 12px;
    }
    .latest-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 14px 16px;
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        background: var(--c-card);
        transition: all var(--transition-speed) ease;
    }
    .latest-item:hover {
        border-color: var(--c-primary-light);
        box-shadow: var(--shadow);
        transform: translateY(-1px);
    }
    .latest-item .meta {
        color: var(--c-text-secondary);
        font-size: 13px;
        margin-top: 2px;
    }
    .latest-item .title {
        font-weight: 700;
        color: var(--c-text);
    }
    .latest-item .rating-pill {
        font-weight: 800;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 13px;
    }
    .latest-actions {
        display: flex;
        gap: 8px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
    }
    ::-webkit-scrollbar-track {
        background: var(--c-bg);
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
        background: var(--c-primary-light);
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: var(--c-primary);
    }

    @media (max-width: 760px) {
        .topbar {
            align-items: flex-start;
            flex-direction: column;
        }
        .grid.two,
        .form-row {
            grid-template-columns: 1fr;
        }
        .preview {
            flex-direction: column;
            align-items: stretch;
        }
        .latest-item {
            grid-template-columns: 1fr;
        }
    }
</style>

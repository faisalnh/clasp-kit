<section class="card">
  <p class="eyebrow">Proposal insertion</p>
  <h1>Insert Sustainability Rating into Proposal</h1>
  <div id="insert-summary" class="loading">Loading assessment…</div>
  <div id="insert-error" class="alert error" style="display:none"></div>
  <div id="insert-success" class="alert success" style="display:none"></div>
  <div class="form-row">
    <div style="grid-column:1/-1"><label for="insert-doc-url">Google Docs proposal URL</label><input id="insert-doc-url" placeholder="https://docs.google.com/document/d/.../edit"></div>
  </div>
  <button id="insert-btn" class="primary">Insert Rating into Proposal</button>
</section>
